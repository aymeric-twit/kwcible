<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <rect width="200" height="140" fill="#f8fafc" rx="8"/>
  <!-- Bullseye target -->
  <circle cx="95" cy="72" r="48" fill="none" stroke="#e8f4f4" stroke-width="12"/>
  <circle cx="95" cy="72" r="36" fill="none" stroke="#66b2b2" stroke-width="10" opacity="0.4"/>
  <circle cx="95" cy="72" r="22" fill="none" stroke="#66b2b2" stroke-width="8" opacity="0.6"/>
  <circle cx="95" cy="72" r="10" fill="#004c4c"/>
  <!-- Keyword tag hitting center -->
  <rect x="120" y="30" width="55" height="22" rx="4" fill="#fbb03b"/>
  <circle cx="132" cy="41" r="3" fill="#fff"/>
  <line x1="120" y1="41" x2="95" y2="72" stroke="#004c4c" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
  <!-- Tag lines (abstract keyword) -->
  <line x1="138" y1="38" x2="163" y2="38" stroke="#004c4c" stroke-width="2.5" opacity="0.6"/>
  <line x1="138" y1="44" x2="157" y2="44" stroke="#004c4c" stroke-width="1.5" opacity="0.4"/>
  <!-- Impact marker -->
  <circle cx="95" cy="72" r="4" fill="#fbb03b"/>
</svg>